<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>momentum.js</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <script src="js/CSInterface.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/acorn@8.11.3/dist/acorn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/acorn-walk@8.3.2/dist/walk.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs/loader.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="toolbar">
        <div class="toolbar-left">
          <button
            id="toggleFileList"
            class="icon-button toggle-file-list-button"
            title="Collapse file list"
            aria-label="Collapse file list"
          >
            <i class="fas fa-bars"></i>
          </button>
          <button id="newFile" class="icon-button">
            <i class="fas fa-plus"></i>
          </button>
          <button id="saveFile" class="icon-button">
            <i class="fas fa-save"></i>
          </button>
        </div>

        <div class="toolbar-center">
          <span id="current-filename"></span>
        </div>

        <div class="toolbar-right">
          <select id="renderModeSelect" class="run-mode-select" title="Render mode">
            <option value="vector">Vector</option>
            <option value="bitmap">Bitmap</option>
          </select>
          <button id="runEditorScript" class="icon-button" hidden>
            <i class="fas fa-play"></i>
          </button>
        </div>
      </div>

      <div id="main-content">
        <div id="file-list"></div>

        <div id="right-panel">
          <div id="editor-container">
            <div id="editor"></div>
          </div>

          <div id="console-container">
            <div id="console-title">Console</div>
            <div id="console-output"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/ui/console/manager.js"></script>
    <script src="js/ui/editor/runtime/preprocessor.js"></script>
    <script src="bundle/includes/registry.js"></script>
    <script src="js/compiler/core/ast.js"></script>
    <script src="js/compiler/core/context.js"></script>
    <script src="js/compiler/core/symbols.js"></script>
    <script src="js/compiler/core/semantics.js"></script>
    <script src="js/compiler/core/typeInference.js"></script>
    <script src="js/compiler/core/callValidation.js"></script>
    <script src="js/compiler/collectors/entryPoints.js"></script>
    <script src="js/compiler/collectors/globalBindings.js"></script>
    <script src="js/compiler/collectors/environmentConfig.js"></script>
    <script src="js/compiler/collectors/assetCollection.js"></script>
    <script src="js/compiler/validators/undeclaredIdentifiers.js"></script>
    <script src="js/compiler/validators/assetValidationPass.js"></script>
    <script src="js/compiler/validators/callValidationPass.js"></script>
    <script src="js/compiler/analyzers/conditionAnalysis.js"></script>
    <script src="js/compiler/analyzers/loopAnalysis.js"></script>
    <script src="js/compiler/analyzers/backgroundAnalysis.js"></script>
    <script src="js/compiler/analyzers/dependencyAnalysis.js"></script>
    <script src="js/compiler/analyzers/runtimeAnalysis.js"></script>
    <script src="js/compiler/rewriters/callsiteInstrumentation.js"></script>
    <script src="js/compiler/rewriters/reservedData.js"></script>
    <script src="js/compiler/compilerPipeline.js"></script>
    <script src="js/plugin/bridge.js"></script>
    <script src="js/plugin/asset.js"></script>
    <script src="js/plugin/bitmap.js"></script>
    <script src="js/ui/editor/runtime/codeExecutor.js"></script>
    <script src="js/ui/editor/runtime/capabilities.js"></script>
    <script src="js/ui/files/fileTree.js"></script>
    <script src="js/ui/files/fileManager.js"></script>
    <script src="js/analyzer/shared/ast.js"></script>
    <script src="js/analyzer/shared/registry.js"></script>
    <script src="js/analyzer/analysis/conditions.js"></script>
    <script src="js/analyzer/analysis/loops.js"></script>
    <script src="js/analyzer/analysis/dependencies.js"></script>
    <script src="js/analyzer/runtime/stubs.js"></script>
    <script src="js/analyzer/runtime/loaders.js"></script>
    <script src="js/analyzer/runtime/expose.js"></script>
    <script src="js/analyzer/runtime/index.js"></script>
    <script src="js/analyzer/assets/io.js"></script>
    <script src="js/analyzer/assets/fonts.js"></script>
    <script src="js/analyzer/assets/images.js"></script>
    <script src="js/analyzer/index.js"></script>
    <script src="js/ui/editor/features/validation.js"></script>
    <script src="js/ui/editor/features/autocomplete.js"></script>
    <script src="js/ui/editor/features/interactions.js"></script>
    <script src="js/ui/editor/core/manager.js"></script>
    <script src="js/ui/editor/index.js"></script>
    <script src="js/ui/app/host.js"></script>
    <script src="js/ui/app/bootstrap.js"></script>
  </body>
</html>
